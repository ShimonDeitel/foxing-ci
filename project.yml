name: Foxing
options:
  bundleIdPrefix: com.shimondeitel.foxing
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Foxing:
    type: application
    platform: iOS
    sources:
      - path: Foxing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foxing
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Foxing/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FoxingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FoxingTests
      - path: Foxing.storekit
    dependencies:
      - target: Foxing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foxing.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FoxingUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FoxingUITests
    dependencies:
      - target: Foxing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.foxing.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Foxing:
    build:
      targets:
        Foxing: all
        FoxingTests: [test]
        FoxingUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Foxing.storekit
    test:
      config: Debug
      storeKitConfiguration: Foxing.storekit
      targets:
        - FoxingTests
        - FoxingUITests
    archive:
      config: Release
